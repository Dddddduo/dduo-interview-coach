<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Coach — 面经题库</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        /* Dashboard specific */
        .welcome-banner {
            background:linear-gradient(135deg, rgba(88,166,255,0.1), rgba(163,113,247,0.1));
            border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px 28px; margin-bottom:24px;
        }
        .welcome-banner h2 { font-size:1.2rem; margin-bottom:4px; }
        .welcome-banner p { color:var(--text-2); font-size:0.85rem; }
        .dashboard-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
        .dashboard-grid .full-width { grid-column:1/-1; }
        .recent-qs { }
        .cat-chart { }
        .cat-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .cat-bar-name { width:80px; font-size:0.78rem; color:var(--text-2); text-align:right; }
        .cat-bar-track { flex:1; height:20px; background:var(--border); border-radius:4px; overflow:hidden; }
        .cat-bar-fill { height:100%; border-radius:4px; background:var(--accent); transition:width 0.6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:0.65rem; font-weight:600; color:#fff; }
        .daily-tip { padding:12px 16px; background:var(--green-bg); border:1px solid var(--green); border-radius:var(--radius); font-size:0.85rem; margin-top:12px; }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- Mobile Top Bar -->
    <div class="topbar-mobile">
        <button class="menu-btn" id="menu-btn">☰</button>
        <span style="font-weight:600;">🎯 Interview Coach</span>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Welcome Banner -->
        <div class="welcome-banner" id="welcome-banner">
            <h2>👋 欢迎回来</h2>
            <p id="welcome-msg">加载中...</p>
        </div>

        <!-- Stat Cards -->
        <div id="stat-cards"></div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Today's Review -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📋 今日待复习</span>
                    <a href="daily.html" class="btn btn-sm btn-ghost">查看全部 →</a>
                </div>
                <div class="card-body" id="today-review-preview"></div>
            </div>

            <!-- Category Distribution -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📊 分类分布</span>
                    <a href="stats.html" class="btn btn-sm btn-ghost">详细统计 →</a>
                </div>
                <div class="card-body" id="cat-distribution"></div>
            </div>

            <!-- Recent Questions -->
            <div class="card full-width">
                <div class="card-header">
                    <span class="card-title">📝 最近归档</span>
                    <div class="actions">
                        <input type="text" class="input" id="quick-search" placeholder="🔍 快速搜索..." style="width:220px;">
                        <a href="questions.html" class="btn btn-sm btn-secondary">题库浏览器 →</a>
                    </div>
                </div>
                <div class="card-body" id="recent-questions"></div>
            </div>

            <!-- Knowledge Tags -->
            <div class="card full-width">
                <div class="card-header">
                    <span class="card-title">🏷️ 知识点标签</span>
                    <a href="knowledge.html" class="btn btn-sm btn-ghost">知识图谱 →</a>
                </div>
                <div class="card-body tag-cloud" id="tag-cloud-mini"></div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div style="text-align:center;padding:24px;margin-top:16px;">
            <a href="daily.html" class="btn btn-primary btn-lg">📅 开始今日复习</a>
            <a href="about.html" class="btn btn-secondary btn-lg" style="margin-left:8px;">📖 关于项目</a>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
