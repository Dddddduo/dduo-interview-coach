<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Interview Coach — 面经题库</title>
<link rel="stylesheet" href="css/app.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<style>[v-cloak]{display:none}.fade-enter-active,.fade-leave-active{transition:opacity .2s}.fade-enter-from,.fade-leave-to{opacity:0}</style></head>
<body>
<div id="app" v-cloak>
<div class="topbar-mobile"><button class="menu-btn" @click="sb=!sb">☰</button><span style="font-weight:600">🎯 Interview Coach</span></div>
<div v-if="sb" class="sidebar-overlay" @click="sb=false"></div>
<aside class="sidebar" :class="{open:sb}">
<div class="sidebar-brand"><span class="logo">🎯</span> Interview Coach</div>
<nav class="sidebar-nav">
<div class="sidebar-section">主菜单</div>
<router-link to="/" class="sidebar-link" @click="sb=false"><span class="icon">🏠</span>仪表盘<span class="badge" v-if="tr>0">{{tr}}</span></router-link>
<router-link to="/daily" class="sidebar-link" @click="sb=false"><span class="icon">📅</span>每日复习</router-link>
<router-link to="/quiz" class="sidebar-link" @click="sb=false"><span class="icon">🎲</span>随机测验</router-link>
<router-link to="/memory" class="sidebar-link" @click="sb=false"><span class="icon">🧠</span>记忆训练</router-link>
<router-link to="/knowledge" class="sidebar-link" @click="sb=false"><span class="icon">🔗</span>知识图谱</router-link>
<router-link to="/stats" class="sidebar-link" @click="sb=false"><span class="icon">📊</span>学习统计</router-link>
<router-link to="/browser" class="sidebar-link" @click="sb=false"><span class="icon">📚</span>题库浏览器</router-link>
</nav>
<div class="sidebar-footer">🔥连续{{sk}}天·{{qs.length}}题</div>
</aside>
<main class="main-content"><router-view></router-view></main>
</div>
<script src="js/vue-app.js"></script>
</body></html>
