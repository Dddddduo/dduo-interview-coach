<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例输出 — Interview Coach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 24px; }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 32px 0;
            text-align: center;
            margin-bottom: 32px;
        }
        header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        header a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }

        /* Markdown content styling */
        .markdown-body { font-size: 0.95rem; }
        .markdown-body h1 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin: 24px 0 16px; }
        .markdown-body h2 { font-size: 1.4rem; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .markdown-body h3 { font-size: 1.1rem; margin: 20px 0 8px; color: var(--accent); }
        .markdown-body h4 { font-size: 1rem; margin: 16px 0 8px; }
        .markdown-body p { margin: 12px 0; }
        .markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 8px 16px;
            margin: 12px 0;
            background: var(--bg-secondary);
            border-radius: 0 6px 6px 0;
            color: var(--text-secondary);
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        .markdown-body th, .markdown-body td {
            padding: 10px 14px;
            text-align: left;
            border: 1px solid var(--border);
        }
        .markdown-body th { background: var(--bg-secondary); font-weight: 600; }
        .markdown-body code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .markdown-body pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .markdown-body strong { color: #f0f6fc; }
        .markdown-body em { color: var(--text-secondary); }

        footer {
            text-align: center;
            padding: 32px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .markdown-body table { font-size: 0.8rem; }
            .markdown-body th, .markdown-body td { padding: 6px 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>📄 示例输出</h1>
        <a href="index.html">← 返回首页</a>
    </div>
</header>

<div class="container">
    <div id="content" class="markdown-body">
        <p>加载中...</p>
    </div>
</div>

<footer>
    <div class="container">
        <p><a href="https://github.com/Dddddduo/dduo-interview-coach">Interview Coach</a> — Harness Engineering Architecture</p>
    </div>
</footer>

<script>
// Fetch and render the sample markdown
fetch('sample-output.md')
    .then(r => r.text())
    .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        hljs.highlightAll();
    })
    .catch(() => {
        document.getElementById('content').innerHTML = '<p>加载示例文件失败。</p>';
    });
</script>

</body>
</html>
