<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例输出 — Interview Coach</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <style>
        .sample-content { max-width:820px; margin:0 auto; }
        .sample-content h1 { font-size:1.6rem; border-bottom:2px solid var(--border); padding-bottom:12px; margin:24px 0 16px; }
        .sample-content h2 { font-size:1.3rem; margin:32px 0 12px; border-bottom:1px solid var(--border); padding-bottom:6px; }
        .sample-content h3 { font-size:1.05rem; margin:20px 0 8px; color:var(--accent); }
        .sample-content p { margin:10px 0; }
        .sample-content blockquote { border-left:3px solid var(--accent); padding:8px 16px; margin:12px 0; background:var(--bg-2); border-radius:0 6px 6px 0; color:var(--text-2); }
        .sample-content table { width:100%; border-collapse:collapse; margin:14px 0; }
        .sample-content th,.sample-content td { padding:8px 12px; border:1px solid var(--border); }
        .sample-content th { background:var(--bg-2); font-weight:600; }
        .sample-content code { background:var(--bg-2); padding:2px 6px; border-radius:4px; font-size:0.88em; }
        .sample-content pre { background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:16px; overflow-x:auto; }
        .sample-content pre code { background:none; padding:0; }
        .sample-content ul,.sample-content ol { padding-left:22px; }
        .sample-content li { margin:4px 0; }
        .sample-content hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="topbar-mobile">
        <button class="menu-btn" id="menu-btn">☰</button>
        <span style="font-weight:600;">📄 示例输出</span>
    </div>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="section-hd">
            <h2>📄 示例输出</h2>
            <a href="index.html" class="btn btn-sm btn-secondary">🏠 回到仪表盘</a>
        </div>
        <div id="content" class="sample-content"><div class="loading"><div class="spinner"></div><p>加载中...</p></div></div>
    </main>
</div>
<script src="js/app.js"></script>
<script>
App.init('sample');
fetch('sample-output.md')
    .then(r => r.text())
    .then(md => { document.getElementById('content').innerHTML = marked.parse(md); hljs.highlightAll(); })
    .catch(() => { document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><h3>示例文件加载失败</h3></div>'; });
</script>
</body>
</html>
