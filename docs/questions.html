<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库浏览器 — Interview Coach</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d2991d;
            --accent-purple: #a371f7;
            --accent-red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 32px 0 20px;
        }
        header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        header a { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
        .header-nav { display: flex; gap: 16px; margin-top: 8px; }
        .header-nav a { padding: 4px 0; border-bottom: 2px solid transparent; }
        .header-nav a.active { border-bottom-color: var(--accent); color: var(--text); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 24px 0; }
        .stat-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; text-align: center;
        }
        .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

        /* Search */
        .search-bar { margin: 20px 0; }
        .search-bar input {
            width: 100%; padding: 10px 16px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-secondary);
            color: var(--text); font-size: 0.95rem; outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar input::placeholder { color: var(--text-secondary); }

        /* Categories */
        .cat-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 16px 0; }
        .cat-btn {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--bg-secondary); color: var(--text);
            cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
        }
        .cat-btn:hover { border-color: var(--accent); }
        .cat-btn.active { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
        .cat-btn .count { color: var(--text-secondary); font-size: 0.75rem; margin-left: 2px; }

        /* Difficulty filter */
        .diff-filter { display: flex; align-items: center; gap: 6px; margin: 16px 0; flex-wrap: wrap; }
        .diff-btn {
            padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary);
            cursor: pointer; font-size: 0.78rem; transition: all 0.15s;
        }
        .diff-btn:hover { border-color: var(--accent); }
        .diff-btn.active { border-color: currentColor; font-weight: 600; }

        /* Question Cards */
        .question-cards { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
        .question-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 20px; transition: border-color 0.15s;
        }
        .question-card:hover { border-color: var(--accent); }
        .qc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .qc-id {
            background: rgba(88,166,255,0.12); color: var(--accent);
            padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600;
            font-family: monospace;
        }
        .qc-cat { font-size: 0.8rem; color: var(--text-secondary); }
        .qc-diff { font-size: 0.78rem; font-weight: 600; }
        .qc-date { font-size: 0.75rem; color: var(--text-secondary); margin-left: auto; }
        .qc-question { font-size: 0.95rem; font-weight: 500; margin-bottom: 8px; line-height: 1.5; }
        .qc-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            background: rgba(163,113,247,0.1); color: var(--accent-purple);
            font-size: 0.72rem; cursor: pointer; transition: all 0.15s;
        }
        .tag:hover { background: rgba(163,113,247,0.25); }
        .qc-file { margin-top: 8px; font-size: 0.8rem; }
        .qc-file a { color: var(--accent-green); text-decoration: none; }
        .result-count { text-align: center; color: var(--text-secondary); font-size: 0.82rem; padding: 12px; }

        /* Tag Cloud */
        .section-title {
            font-size: 1.05rem; margin: 28px 0 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .tag-cloud-wrap {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; line-height: 2;
        }
        .tag-cloud-item {
            display: inline-block; margin: 2px 6px; cursor: pointer;
            color: var(--accent-purple); transition: color 0.15s;
        }
        .tag-cloud-item:hover { color: var(--accent); }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 48px 20px; color: var(--text-secondary);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-state code {
            background: var(--bg-secondary); padding: 2px 8px; border-radius: 4px;
            font-size: 0.85em;
        }

        /* Footer */
        footer {
            text-align: center; padding: 32px 0; color: var(--text-secondary);
            font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 40px;
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .qc-header { flex-direction: column; align-items: flex-start; gap: 4px; }
            .qc-date { margin-left: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>📚 题库浏览器</h1>
        <a href="index.html">← 返回首页</a>
        <div class="header-nav">
            <a href="index.html">🏠 首页</a>
            <a href="questions.html" class="active">📚 题库浏览</a>
            <a href="sample.html">📄 示例输出</a>
        </div>
    </div>
</header>

<div class="container">
    <!-- 统计 -->
    <div id="stats" class="stats-row"></div>

    <!-- 搜索 -->
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 搜索题目、标签、分类...">
    </div>

    <!-- 分类导航 -->
    <div id="category-nav" class="cat-nav"></div>

    <!-- 题目列表 -->
    <div id="app">
        <div id="question-list"></div>
    </div>

    <!-- 标签云 -->
    <h3 class="section-title">🏷️ 标签云</h3>
    <div id="tag-cloud" class="tag-cloud-wrap"></div>
</div>

<footer>
    <div class="container">
        <p><a href="https://github.com/Dddddduo/dduo-interview-coach">Interview Coach</a> — Harness Engineering Architecture</p>
    </div>
</footer>

<script src="questions.js"></script>
</body>
</html>
