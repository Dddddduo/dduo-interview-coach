<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日复习 — Interview Coach</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="app-layout">
    <div class="topbar-mobile">
        <button class="menu-btn" id="menu-btn">☰</button>
        <span style="font-weight:600;">📅 每日复习</span>
    </div>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <div class="section-hd">
            <h2>📅 每日复习</h2>
            <div class="actions">
                <button class="btn btn-sm btn-secondary" onclick="DR.markAll()">✅ 全部标记已复习</button>
            </div>
        </div>

        <!-- Stats -->
        <div id="daily-stats"></div>

        <!-- Progress -->
        <div class="card" style="margin-bottom:20px;">
            <div class="card-header"><span class="card-title">📊 今日进度</span></div>
            <div class="card-body">
                <div class="progress-wrap">
                    <div class="progress-label"><span id="prog-label">0 / 0 题</span><span id="prog-pct">0%</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
                </div>
            </div>
        </div>

        <!-- Mini Calendar -->
        <div class="card" style="margin-bottom:20px;">
            <div class="card-header"><span class="card-title">📆 最近 30 天</span></div>
            <div class="card-body"><div class="cal-mini" id="cal-mini"></div></div>
        </div>

        <!-- Review List -->
        <div class="section-hd"><h2>📋 待复习清单</h2></div>
        <div id="review-list"></div>
    </main>
</div>

<script src="js/app.js"></script>
<script src="js/daily.js"></script>
</body>
</html>
